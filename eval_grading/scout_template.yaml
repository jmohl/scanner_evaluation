## Template Scout Yaml ##
# It's convenient to set up scout.yaml inside a specific eval directory while working on that eval
# This allows scout view to source the correct transcripts and scans, without also picking up additional data from other evals
# This can also be used to specify scanners to be run, scan settings, etc.
# The below example is set up to read transcripts from the HF dataset, but save new scans into the current directory. This is the best practice to delineate experimental/working scans from final data.

# Note: you can specify an individual run in the transcripts here if there are multiple evals and you don't want to scan all of them. However this does mean that scout view may not display transcripts properly. Generally I would use this setting to run scans and then revert to the top level directory when reviewing.
transcripts: ../../evals/<eval_name>/eval-logs
scans: ./scan-results

scanners:
  # - name: answer_format
  #   file: ../../scanners.py #note, explicit file paths may be cleaner
  # - name: command_not_found
  #   file: ../../scanners.py
  # - name: guessing
  #   file: ../../scanners.py
  # - name: ground_truth_access
  #   file: ../../scanners.py
  ## Grading support scanners
  - name: grading_answers
    file: ../../scanners.py
  - name: grading_guessing
    file: ../../scanners.py
  # - name: grading_guessing_asst
  #   file: ../../scanners.py
validation:
#   answer_format: ./core_bench/validation/core_bench_easy_oh1_3pointscale.csv
#   command_not_found: ./core_bench/validation/core_bench_medium_t2.csv
model: openai/gpt-5-mini-2025-08-07
generate_config:
  max_connections: 50
